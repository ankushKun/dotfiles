# enable extended keys support (fixes modified Enter keys in modern terminals)
set -g extended-keys on

# Allow passthrough of escape sequences (needed for yazi terminal detection,
# kitty graphics protocol, and other modern terminal features inside tmux).
# Requires tmux >= 3.3.
set -g allow-passthrough on

# change the prefix from 'C-b' to 'C-space'
unbind C-b
set -g prefix C-Space

# status bar hide when focused
set-hook -g after-resize-pane "if-shell \"tmux list-panes -F '#F' | grep -q Z\" \"set -g status off\" \"set -g status on\""

# hide/show status bar through s/S
unbind s
unbind S
bind s set status off
bind S set status on

# reload config file
unbind r
bind r source-file ~/.config/tmux/tmux.conf \; #display "Reloaded ~/.tmux.conf"

# Start counting from 1
set -g base-index 1
setw -g pane-base-index 1

unbind '"'
unbind '%'
unbind v
unbind h
unbind c

# split panes using h and v, make sure they open in the same path
bind v split-window -h -c "#{pane_current_path}"
bind h split-window -v -c "#{pane_current_path}"

# shorten command delay
set -sg escape-time 1

# status bar refresh rate
set -g status-interval 1

# rename windows automatically
set -g allow-rename on

# mouse control (clickable windows, panes, resizable panes)
set -g mouse on

# Switch tmux panes with Cmd+arrows (remapped via kitty.conf send_text)
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Resize panes with Ctrl+Shift+arrows (macOS uses Ctrl+Arrow for workspaces)
bind -n C-S-Left resize-pane -L 5
bind -n C-S-Right resize-pane -R 5
bind -n C-S-Up resize-pane -U 5
bind -n C-S-Down resize-pane -D 5

# Forward Shift+Enter / Ctrl+Enter to apps as kitty keyboard protocol
# sequences so TUIs (OpenCode, grut, etc.) see a newline. Pair with the
# matching `map` entries in kitty.conf; `extended-keys on` above keeps
# the CSI u form intact when kitty hands it off to tmux.
bind -n S-Enter send-keys "\033[13;2u"
bind -n C-Enter send-keys "\033[13;5u"

# enable vi mode keys
set-window-option -g mode-keys vi

# unbind n
unbind w
unbind q
bind R command-prompt "rename-window '%%'"
bind w new-window -c "#{pane_current_path}"
bind q killp

### stuff to fix broken colorschemes and all in tmux

set -g -a terminal-overrides ',*:Ss=\E[%p1%d q:Se=\E[2 q'
set -g default-terminal "xterm-256color"
set -ag terminal-features ",xterm-256color:RGB"

# Pass TERM and TERM_PROGRAM through so yazi can detect terminal capabilities.
# Required for yazi's tmux support — see https://yazi-rs.github.io/docs/faq#trt
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

#############################
### appearances and stuff ###
#############################

# loud or quiet?
set -g visual-activity on
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none

# # statusbar
set -g status-bg '#323749'
set -g status-fg '#A9B2D2'
set -g status-left '#[bg=#C5FF89 fg=#000000] weeblet '
set -g status-right '#[bg=#24283B] %d/%m | %I:%M '

# Keep global pane styles neutral. Inactive-pane dimming is applied per pane by
# scripts/tmux-pane-styles.sh so the active pane can keep application colors.
set -g window-style 'default'
set -g window-active-style 'default'

# Apply dimming once when the config is loaded.
run-shell 'sh ~/.config/tmux/tmux-pane-styles.sh'

# Reapply pane dimming whenever focus or visible panes change.
set-hook -g after-select-pane 'run-shell -b "sh ~/.config/tmux/tmux-pane-styles.sh"'
set-hook -g after-select-window 'run-shell -b "sh ~/.config/tmux/tmux-pane-styles.sh"'

# After splitting, even only the affected adjacent panes instead of retiling the
# whole window; this preserves the visual location of the split and manual sizes.
set-hook -g after-split-window 'select-layout -E; run-shell -b "sh ~/.config/tmux/tmux-pane-styles.sh"'
set-hook -g after-kill-pane 'run-shell -b "sh ~/.config/tmux/tmux-pane-styles.sh"'
set-hook -g pane-exited 'run-shell -b "sh ~/.config/tmux/tmux-pane-styles.sh"'
set-hook -g pane-died 'run-shell -b "sh ~/.config/tmux/tmux-pane-styles.sh"'
set-hook -g client-attached 'run-shell -b "sh ~/.config/tmux/tmux-pane-styles.sh"'
set-hook -g client-session-changed 'run-shell -b "sh ~/.config/tmux/tmux-pane-styles.sh"'
set-hook -g session-window-changed 'run-shell -b "sh ~/.config/tmux/tmux-pane-styles.sh"'

# Pane borders: use simple single-line borders, disable tmux's extra active-pane
# indicators, and show the active pane with a green border.
set -g pane-border-lines single
set -g pane-border-indicators off
set -g pane-border-style 'fg=#292e42,bg=default'
set -g pane-active-border-style 'fg=#9ece6a,bg=default'

set -g window-status-current-format "#[bg=#1F2335]  #I #W "
set -g window-status-format "#[nobold,noitalics,nounderscore]  #I #W "

