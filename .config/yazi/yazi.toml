# yazi general config.
# Tokyo Night themed — see .config/yazi/theme.toml for colors.
#
# Image preview in tmux + kitty requires tmux >= 3.4 with the
# Kitty graphics protocol passthrough. The existing tmux.conf already
# sets `terminal-features ",xterm-256color:RGB"`, which is enough for
# the current tmux release line.

[mgr]
# Mimics the nvim split: a narrow file tree on the left, a wider
# current-pane in the middle, and a roomy preview pane on the right.
ratio        = [1, 2, 5]
sort_by      = "natural"
sort_dir_first = true
linemode     = "size_and_mtime"   # defined in init.lua
show_hidden  = false
show_symlink = true
scrolloff    = 5
mouse_events = ["click", "scroll", "touch", "move"]

[preview]
tab_size      = 2
max_width     = 2000
max_height    = 2000
image_filter  = "lanczos3"
image_quality = 90

[opener]
edit = [
  { run = "$EDITOR \"$1\"", desc = "Edit", block = true, for = "unix" },
]
open = [
  { run = "open \"$1\"",   desc = "Open with default app", for = "macos" },
  { run = "xdg-open \"$1\"", desc = "Open with default app", for = "linux" },
]
play = [
  { run = "open \"$1\"",   desc = "Open with default app", for = "macos" },
]
extract = [
  { run = "unar \"$1\"",   desc = "Extract archive", for = "unix" },
]

[open]
prepend_rules = [
  { mime = "text/*",                                       use = "edit" },
  { mime = "application/json",                             use = "edit" },
  { mime = "{audio,video}/*",                              use = "play" },
  { mime = "application/{zip,tar,xz,bzip,gzip,7z-compressed}", use = "extract" },
]

[tasks]
file_workers    = 4
plugin_workers  = 2
fetch_workers   = 4
preload_workers = 2

# Git status plugin — vendored at plugins/git.yazi/
[plugin]
prepend_previewers = [
  { mime = "text/markdown", run = "glow" },
]
prepend_fetchers = [
  { id = "git", url = "*",  run = "git", group = "git" },
  { id = "git", url = "*/", run = "git", group = "git" },
]
