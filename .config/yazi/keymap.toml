# Yazi keybindings. The default keymap is preserved — these are
# additions (prepend_*), so they take priority over the built-in ones.

[mgr]
prepend_keymap = [
  # Quick directory jumps (g + <key>).
  { on = [ "g", "~" ], run = "cd ~",                 desc = "Go to home" },
  { on = [ "g", "h" ], run = "cd ~",                 desc = "Go to home" },
  { on = [ "g", "c" ], run = "cd ~/.dotfiles",       desc = "Go to dotfiles" },
  { on = [ "g", "d" ], run = "cd ~/Downloads",       desc = "Go to Downloads" },
  { on = [ "g", "D" ], run = "cd ~/Desktop",         desc = "Go to Desktop" },

  # Toggle hidden files (single key override of the default `Ctrl+H`).
  { on = "<C-h>",      run = "hidden toggle",       desc = "Toggle hidden files" },

  # Open hovered file with system default app.
  { on = "<C-o>",      run = "open --hovered",      desc = "Open with default app" },

  # Scroll markdown preview.
  { on = "<C-e>",      run = "seek 5",              desc = "Scroll preview down" },
  { on = "<C-y>",      run = "seek -5",             desc = "Scroll preview up" },
]

[input]
prepend_keymap = [
  { on = "<C-a>", run = "move sol",     desc = "Move to start of line" },
  { on = "<C-e>", run = "move eol",     desc = "Move to end of line" },
  { on = "<C-u>", run = "kill bol",     desc = "Kill to start of line" },
  { on = "<C-k>", run = "kill eol",     desc = "Kill to end of line" },
  { on = "<C-w>", run = "kill backward", desc = "Kill word backward" },
]
