# Tokyo Night theme for Yazi — aligned with kitty (#101015) and nvim ui_colors.

[app]
overall = { bg = "#101015" }

[mgr]
fg            = "#c0caf5"
bg            = "#101015"
hovered       = { fg = "#c0caf5", bg = "#283457" }
selected      = { fg = "#c0caf5", bg = "#283457", bold = true }
cwd           = { fg = "#7aa2f7", bold = true }
find_keyword  = { fg = "#16161e", bg = "#7aa2f7", bold = true }
find_position = { fg = "#7dcfff", bold = true }
symlink_target = { fg = "#545c7e", italic = true }

marker_copied   = { fg = "#7aa2f7", bold = true }
marker_cut      = { fg = "#f7768e", bold = true }
marker_marked   = { fg = "#e0af68", bold = true }
marker_selected = { fg = "#7aa2f7", bold = true }

count_copied   = { fg = "#7aa2f7", bold = true }
count_cut      = { fg = "#f7768e", bold = true }
count_selected = { fg = "#7aa2f7", bold = true }

border_symbol = "│"
border_style  = { fg = "#292e42" }

syntect_theme = "~/.config/yazi/themes/tokyo-night.tmTheme"

[indicator]
parent  = { bg = "#292e42" }
current = { bg = "#7aa2f7" }
preview = { bg = "#545c7e" }
padding = { open = "", close = "" }

[tabs]
active   = { fg = "#16161e", bg = "#7aa2f7", bold = true }
inactive = { fg = "#545c7e", bg = "#15161e" }
sep_inner = { open = "", close = "" }
sep_outer = { open = "", close = "" }

[mode]
normal_main = { fg = "#16161e", bg = "#7aa2f7", bold = true }
normal_alt  = { fg = "#7aa2f7", bg = "#15161e", bold = true }
select_main = { fg = "#16161e", bg = "#e0af68", bold = true }
select_alt  = { fg = "#e0af68", bg = "#15161e", bold = true }
unset_main  = { fg = "#16161e", bg = "#f7768e", bold = true }
unset_alt   = { fg = "#f7768e", bg = "#15161e", bold = true }

[status]
overall          = { fg = "#c0caf5", bg = "#15161e" }
sep_left         = { open = "", close = "" }
sep_right        = { open = "", close = "" }
perm_type        = { fg = "#7aa2f7" }
perm_read        = { fg = "#a9b1d6" }
perm_write       = { fg = "#f7768e" }
perm_exec        = { fg = "#9ece6a" }
perm_sep         = { fg = "#545c7e" }
progress_label   = { fg = "#7dcfff", bold = true }
progress_normal  = { fg = "#7aa2f7", bg = "#7aa2f7" }
progress_error   = { fg = "#f7768e", bg = "#f7768e" }

[which]
cols = 1
mask = { bg = "#15161e" }
cand = { fg = "#7dcfff", bold = true }
rest = { fg = "#545c7e" }
desc = { fg = "#c0caf5" }
separator       = " -> "
separator_style = { fg = "#545c7e" }

[confirm]
border    = { fg = "#7aa2f7" }
title     = { fg = "#7aa2f7", bg = "#15161e", bold = true }
body      = { fg = "#c0caf5", bg = "#101015" }
list      = { fg = "#c0caf5", bg = "#101015" }
btn_yes   = { fg = "#9ece6a", bg = "#101015", bold = true }
btn_no    = { fg = "#f7768e", bg = "#101015", bold = true }
btn_labels = ["Yes", "No"]

[spot]
border   = { fg = "#7aa2f7" }
title    = { fg = "#7aa2f7", bg = "#15161e", bold = true }
tbl_col  = { fg = "#7aa2f7", bg = "#15161e", bold = true }
tbl_cell = { fg = "#c0caf5", bg = "#283457", bold = true }

[notify]
title_info  = { fg = "#7dcfff", bg = "#15161e", bold = true }
title_warn  = { fg = "#e0af68", bg = "#15161e", bold = true }
title_error = { fg = "#f7768e", bg = "#15161e", bold = true }

[pick]
border  = { fg = "#7aa2f7" }
active  = { fg = "#16161e", bg = "#7aa2f7", bold = true }
inactive = { fg = "#c0caf5", bg = "#101015" }

[input]
border   = { fg = "#7aa2f7" }
title    = { fg = "#7aa2f7", bg = "#15161e", bold = true }
value    = { fg = "#c0caf5" }
selected = { fg = "#16161e", bg = "#283457" }

[cmp]
border     = { fg = "#7aa2f7" }
active     = { fg = "#16161e", bg = "#7aa2f7", bold = true }
inactive   = { fg = "#c0caf5", bg = "#101015" }
icon_file   = ""
icon_folder = ""
icon_command = ""

[tasks]
border  = { fg = "#7aa2f7" }
title   = { fg = "#7aa2f7", bg = "#15161e", bold = true }
hovered = { bg = "#283457" }

[help]
on     = { fg = "#7dcfff", bold = true }
run    = { fg = "#bb9af7" }
desc   = { fg = "#c0caf5" }
hovered = { bg = "#283457" }
footer = { fg = "#545c7e" }
icon_info  = "ℹ"
icon_warn  = "⚠"
icon_error = "✗"

[filetype]
rules = [
  { url = "*/",      fg = "#7aa2f7" },
  { url = "*", is = "exec",   fg = "#9ece6a" },
  { url = "*", is = "hidden", fg = "#545c7e" },
  { url = "*",        fg = "#c0caf5" },
]

[git]
unknown  = { fg = "#545c7e" }
ignored  = { fg = "#545c7e" }
untracked = { fg = "#9ece6a" }
modified  = { fg = "#e0af68" }
added     = { fg = "#9ece6a" }
deleted   = { fg = "#f7768e" }
updated   = { fg = "#e0af68" }
clean     = { fg = "reset" }

unknown_sign   = "  "
ignored_sign   = "  "
untracked_sign = "? "
modified_sign  = "* "
added_sign     = "+ "
deleted_sign   = "- "
updated_sign   = "* "
clean_sign     = ""
