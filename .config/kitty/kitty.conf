shell /bin/zsh --login --interactive
font_family MesloLGS NF
bold_font MesloLGS NF
italic_font MesloLGS NF
bold_italic_font MesloLGS NF
font_size 14
draw_minimal_borders yes
inactive_text_alpha 0.6
hide_window_decorations yes
tab_fade 0.5 1
background_blur 35
macos_window_resizable yes
placement_strategy center

# Tokyo Night color scheme
background #101015
background_image ~/.config/kitty/miku.png
background_image_layout cscaled
background_image_linear yes
background_tint 0.05
background_opacity 0.85
dynamic_background_opacity yes
foreground #c0caf5
selection_background #283457
selection_foreground #c0caf5
url_color #73daca
cursor #c0caf5
cursor_text_color #1a1b26

# Window polish
window_padding_width 0

# Switch tmux panes with Cmd+arrows
map cmd+left send_text all \x1b[1;3D
map cmd+right send_text all \x1b[1;3C
map cmd+up send_text all \x1b[1;3A
map cmd+down send_text all \x1b[1;3B

# Resize tmux panes with Ctrl+Shift+arrows
map ctrl+shift+left send_text all \x1b[1;6D
map ctrl+shift+right send_text all \x1b[1;6C
map ctrl+shift+up send_text all \x1b[1;6A
map ctrl+shift+down send_text all \x1b[1;6B

# Option+arrow word motion and Option+backspace delete-word (emacs bindings)
map alt+left send_text all \x1bb
map alt+right send_text all \x1bf
map alt+backspace send_text all \x1b\x7f
map alt+up send_text all \x1b[A
map alt+down send_text all \x1b[B

# Switch tmux windows with macOS tab shortcuts.
map shift+cmd+[ send_text all \x00p
map shift+cmd+] send_text all \x00n
map cmd+t send_text all \x00w

# Insert newline (Shift+Enter / Ctrl+Enter) for TUIs that read the kitty
# keyboard protocol, e.g. OpenCode. Works through tmux because tmux.conf
# has `extended-keys on`, which forwards CSI u sequences verbatim.
map shift+enter send_text all \x1b[13;2u
map ctrl+enter send_text all \x1b[13;5u

# Tab bar colors
tab_bar_style powerline
tab_powerline_style slanted
active_tab_font_style bold
inactive_tab_font_style normal
active_tab_background #7aa2f7
active_tab_foreground #16161e
inactive_tab_background #292e42
inactive_tab_foreground #545c7e
tab_bar_background #15161e

# Border colors
active_border_color #7aa2f7
inactive_border_color #292e42

# Normal colors
color0 #15161e
color1 #f7768e
color2 #9ece6a
color3 #e0af68
color4 #7aa2f7
color5 #bb9af7
color6 #7dcfff
color7 #a9b1d6

# Bright colors
color8 #414868
color9 #f7768e
color10 #9ece6a
color11 #e0af68
color12 #7aa2f7
color13 #bb9af7
color14 #7dcfff
color15 #c0caf5

# Extended colors
color16 #ff9e64
color17 #db4b4b
